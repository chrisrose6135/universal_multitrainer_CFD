runs:
- name: residual_mlp
  model.architecture: residual_mlp_gate_direction_v1
  model.sequence_length: 64
  model.dropout: 0.05
  model.mlp_input_mode: last
  model.mlp_hidden_sizes:
  - 256
  - 128
  - 64
  model.mlp_residual_blocks: 2
  model.use_edge_pips_head: false
  model.edge_pips_scale: 12.0
  model.use_analytic_signal_agreement_head: false
  training.gate_pos_weight: 0.35
  training.use_analytic_signal_agreement_loss: false
  training.analytic_signal_agreement_loss_weight: 0.0
  training.use_edge_pips_loss: false
  training.edge_pips_loss_weight: 0.0
  training.curriculum_sampler.start_ratios.no_trade: 3.0
  training.curriculum_sampler.end_ratios.no_trade: 8.0
  replay.min_trades_for_score: 20
  replay.min_trade_probability: 0.6
  replay.min_direction_probability: 0.4
- name: tcn
  model.architecture: hierarchical_tcn_edge_v1
  model.sequence_length: 64
  model.dropout: 0.03
  model.tcn_channels: 48
  model.tcn_blocks: 4
  model.tcn_kernel_size: 5
  model.tcn_dilations:
  - 1
  - 2
  - 4
  - 8
  model.tcn_dropout: 0.03
  model.dense_dropout: 0.03
  model.dense_hidden_sizes:
  - 64
  - 32
  model.use_edge_pips_head: false
  model.edge_pips_scale: 12.0
  model.use_analytic_signal_agreement_head: false
  training.gate_pos_weight: 0.35
  training.use_analytic_signal_agreement_loss: false
  training.analytic_signal_agreement_loss_weight: 0.0
  training.use_edge_pips_loss: false
  training.edge_pips_loss_weight: 0.0
  training.curriculum_sampler.start_ratios.no_trade: 3.0
  training.curriculum_sampler.end_ratios.no_trade: 8.0
  replay.min_trades_for_score: 20
  replay.min_trade_probability: 0.6
  replay.min_direction_probability: 0.4
- name: small_transformer
  model.architecture: small_transformer_gate_direction_v1
  model.sequence_length: 64
  model.dropout: 0.05
  model.d_model: 64
  model.n_heads: 4
  model.num_layers: 2
  model.feedforward_dim: 128
  model.pooling: attention
  model.dense_dropout: 0.05
  model.dense_hidden_sizes:
  - 64
  - 32
  model.use_edge_pips_head: false
  model.edge_pips_scale: 12.0
  model.use_analytic_signal_agreement_head: false
  training.gate_pos_weight: 0.35
  training.use_analytic_signal_agreement_loss: false
  training.analytic_signal_agreement_loss_weight: 0.0
  training.use_edge_pips_loss: false
  training.edge_pips_loss_weight: 0.0
  training.curriculum_sampler.start_ratios.no_trade: 3.0
  training.curriculum_sampler.end_ratios.no_trade: 8.0
  replay.min_trades_for_score: 20
  replay.min_trade_probability: 0.6
  replay.min_direction_probability: 0.4
- name: inception_time
  model.architecture: inception_time_gate_direction_v1
  model.sequence_length: 64
  model.dropout: 0.05
  model.channels: 32
  model.blocks: 3
  model.kernel_sizes:
  - 3
  - 5
  - 9
  - 17
  model.inception_dropout: 0.05
  model.dense_dropout: 0.05
  model.dense_hidden_sizes:
  - 64
  - 32
  model.use_edge_pips_head: false
  model.edge_pips_scale: 12.0
  model.use_analytic_signal_agreement_head: false
  training.gate_pos_weight: 0.35
  training.use_analytic_signal_agreement_loss: false
  training.analytic_signal_agreement_loss_weight: 0.0
  training.use_edge_pips_loss: false
  training.edge_pips_loss_weight: 0.0
  training.curriculum_sampler.start_ratios.no_trade: 3.0
  training.curriculum_sampler.end_ratios.no_trade: 8.0
  replay.min_trades_for_score: 20
  replay.min_trade_probability: 0.6
  replay.min_direction_probability: 0.4
- name: mixture_of_experts
  model.architecture: mixture_of_experts_direction_v1
  model.sequence_length: 64
  model.dropout: 0.05
  model.num_experts: 4
  model.expert_hidden_size: 64
  model.expert_layers: 2
  model.expert_input_mode: last_mean
  model.router_hidden_size: 32
  model.router_inputs:
  - sig_analytic_signal_class
  - sig_buy_signal_count
  - sig_sell_signal_count
  - sig_net_signal_vote
  - sig_signal_conflict
  - sig_any_buy_signal
  - sig_any_sell_signal
  - sig_adx_strength
  - sig_atr_zscore
  model.dense_hidden_sizes:
  - 64
  model.use_edge_pips_head: false
  model.edge_pips_scale: 12.0
  model.use_analytic_signal_agreement_head: false
  training.gate_pos_weight: 0.35
  training.use_analytic_signal_agreement_loss: false
  training.analytic_signal_agreement_loss_weight: 0.0
  training.use_edge_pips_loss: false
  training.edge_pips_loss_weight: 0.0
  training.curriculum_sampler.start_ratios.no_trade: 3.0
  training.curriculum_sampler.end_ratios.no_trade: 8.0
  replay.min_trades_for_score: 20
  replay.min_trade_probability: 0.6
  replay.min_direction_probability: 0.4
- name: tsmixer
  model.architecture: tsmixer_direction_v1
  model.sequence_length: 48
  model.dropout: 0.15
  model.d_model: 96
  model.num_blocks: 4
  model.time_mixing_dim: 96
  model.feature_mixing_dim: 192
  model.pooling: last_mean
  model.dense_hidden_sizes:
  - 96
  - 48
  replay.min_trades_for_score: 20
  replay.min_trade_probability: 0.6
  replay.min_direction_probability: 0.4
- name: patch_tst
  model.architecture: patch_tst_direction_v1
  model.sequence_length: 48
  model.dropout: 0.15
  model.patch_len: 6
  model.stride: 3
  model.d_model: 96
  model.n_heads: 4
  model.num_layers: 3
  model.feedforward_dim: 384
  model.pooling: attention
  model.dense_hidden_sizes:
  - 96
  - 48
  replay.min_trades_for_score: 20
  replay.min_trade_probability: 0.6
  replay.min_direction_probability: 0.4
- name: timesnet
  model.architecture: timesnet_direction_v1
  model.sequence_length: 96
  model.dropout: 0.15
  model.d_model: 64
  model.num_blocks: 3
  model.periods:
  - 6
  - 12
  - 24
  model.pooling: last_mean
  model.dense_hidden_sizes:
  - 96
  - 48
  replay.min_trades_for_score: 20
  replay.min_trade_probability: 0.6
  replay.min_direction_probability: 0.4
