  log_filtered_positions: false
universal:
  enabled: true
  symbols: *id008
  combined_dataset_path: data/universal/UNIVERSAL_M5_direction_training.csv
  output_root: models/universal
  replay_output_dir: logs/universal_replay
  train_sides:
  - buy
  - sell
  model_architectures:
  - residual_mlp
  - tcn
  - inception_time
  - mixture_of_experts
  - llm_transformer
  - tsmixer
  - patch_tst
  - timesnet
  add_symbol_onehot_features: true
  symbol_column: symbol
  symbol_feature_prefix: sym_
  add_symbol_id_feature: false
  sequence_group_column: universal_sequence_group
  respect_sequence_groups: true
  use_split_column: true
  split_column: universal_split
  train_split_label: train
  validation_split_label: validation
  validation_fraction: 0.2
  min_validation_rows_per_symbol: 500
  min_train_rows_per_symbol: 1000
  auto_rebuild_split_after_date_filter: true
  replay_each_epoch_during_training: false
  architecture_configs:
    residual_mlp:
      architecture: residual_mlp_gate_direction_v1
      sequence_length: 48
      mlp_input_mode: last_mean_max
      mlp_hidden_sizes:
      - 256
      - 128
      - 64
      mlp_residual_blocks: 2
      dropout: 0.15
    tcn:
      architecture: hierarchical_tcn_edge_v1
      sequence_length: 64
      tcn_channels: 64
      tcn_blocks: 4
      tcn_kernel_size: 5
      tcn_dilations:
      - 1
      - 2
      - 4
      - 8
      dense_hidden_sizes:
      - 96
      - 48
      dropout: 0.15
    inception_time:
      architecture: inception_time_gate_direction_v1
      sequence_length: 64
      inception_channels: 32
      inception_blocks: 4
      inception_kernel_sizes:
      - 3
      - 5
      - 9
      - 15
      dense_hidden_sizes:
      - 96
      - 48
      dropout: 0.15
    mixture_of_experts:
      architecture: mixture_of_experts_direction_v1
      sequence_length: 48
      num_experts: 4
      expert_hidden_size: 96
      expert_layers: 2
      expert_input_mode: last_mean_max
      router_hidden_size: 64
      dense_hidden_sizes:
      - 96
      - 48
      dropout: 0.15
    llm_transformer:
      architecture: llm_transformer_side_setup_v1
      sequence_length: 48
      d_model: 128
      n_heads: 4
      num_layers: 4
      feedforward_dim: 512
      pooling: cls
      dense_hidden_sizes:
      - 128
      - 64
      dropout: 0.15
    tsmixer:
      architecture: tsmixer_direction_v1
      sequence_length: 48
      d_model: 96
      num_blocks: 4
      time_mixing_dim: 96
      feature_mixing_dim: 192
      pooling: last_mean
      dense_hidden_sizes:
      - 96
      - 48
      dropout: 0.15
    patch_tst:
      architecture: patch_tst_direction_v1
      sequence_length: 48
      patch_len: 6
      stride: 3
      d_model: 96
      n_heads: 4
      num_layers: 3
      feedforward_dim: 384
      pooling: attention
      dense_hidden_sizes:
      - 96
      - 48
      dropout: 0.15
    timesnet:
      architecture: timesnet_direction_v1
      sequence_length: 96
      d_model: 64
      num_blocks: 3
      periods:
      - 6
      - 12
      - 24
      pooling: last_mean
      dense_hidden_sizes:
      - 96
      - 48
      dropout: 0.15
