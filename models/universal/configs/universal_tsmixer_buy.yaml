  num_blocks: 4
  time_mixing_dim: 96
  feature_mixing_dim: 192
  pooling: last_mean
training:
  date_start: null
  date_end: null
  seed: 43
  deterministic: true
  reseed_each_epoch: true
  epoch_seed_mode: base_plus_symbol_plus_epoch
  max_rows: null
  use_pregenerated_direction_data: true
