  batch_size: 512
  epochs: 50
  learning_rate: 0.0005
  weight_decay: 0.0001
  gradient_clip_norm: 1.0
  val_fraction: 0.2
  train_validation_embargo_bars: 88
  auto_min_train_validation_embargo: true
  early_stopping_patience: 1000
  min_delta: 0.0001
  model_selection_metric: replay_score
  replay_each_epoch: false
  replay_start: '2025-03-01'
  replay_end: '2025-09-01'
  replay_output_dir: logs/training_replay_direction
  use_curriculum_sampler: true
  curriculum_sampler:
    enabled: true
    schedule: linear
    start_epoch: 1
    end_epoch: 30
    anchor_class: max_positive
    start_ratios:
      sell: 1.0
      no_trade: 0.75
      buy: 1.0
    end_ratios:
      sell: 1.0
      no_trade: 3.0
      buy: 1.0
    with_replacement:
      sell: true
      no_trade: false
      buy: true
    shuffle: true
  gate_loss_weight: 1.0
  side_direction_loss_weight: 1.0
  use_edge_pips_loss: false
  edge_pips_loss_weight: 0.0
  gate_pos_weight: 0.35
  side_direction_class_weights:
    sell: 1.0
    buy: 1.0
  use_analytic_signal_agreement_loss: false
  analytic_signal_agreement_loss_weight: 0.0
  target_mode: side_setup_ranking
  setup_loss_weight: 1.0
  buy_setup_loss_weight: 1.0
  sell_setup_loss_weight: 1.0
  setup_pos_weight: auto
  min_setup_pos_weight: 0.5
  max_setup_pos_weight: 8.0
  use_setup_quality_loss: true
  setup_quality_loss_weight: 0.1
  pregenerated_direction_data_path: data/universal/UNIVERSAL_M5_direction_training.csv
  side_setup_train_side: buy
  train_side: buy
replay:
